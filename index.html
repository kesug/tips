<style>
/* General Reset */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-color: #000;
    color: #fff;
    font-family: 'Fira Sans', sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
}

.main-wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    max-width: 600px;
    width: 100%;
    text-align: center;
}

/* Image/Logo */
.logo-container {
    margin-bottom: 20px;
}

.profile-img {
    width: 170px;
    border-radius: 50%;
    transition: transform 0.3s ease;
}

/* Typography */
.headline {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 25px;
}

.text-content {
    margin-bottom: 30px;
}

.highlight-text {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
}

.main-desc {
    font-size: 20px;
    margin-top: 15px;
}

/* Button Styling */
.button-wrapper {
    margin: 30px 0;
}

.cta-button {
    display: inline-block;
    background-color: #0174C7;
    color: #fff;
    text-decoration: none;
    padding: 15px 40px;
    border-radius: 5px;
    border-bottom: 4px solid #014d82;
    transition: all 0.3s ease;
    width: 100%;
    max-width: 450px;
}

.btn-main-text {
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.btn-sub-text {
    display: block;
    font-size: 18px;
    opacity: 0.9;
    margin-top: 5px;
}

/* UPDATED RED MINI TIMER */
.new-countdown-wrapper {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 10px; /* Gap thoda kam kiya */
}

.time-box {
    text-align: center;
    min-width: 40px; /* Width kam ki */
}

.time-box span {
    font-size: 1.8rem; /* Size chota kiya */
    font-weight: bold;
    display: block;
    line-height: 1;
    color: #ff0000; /* Pure Red Color */
}

.time-box p {
    font-size: 0.6rem; /* Label size chota kiya */
    text-transform: uppercase;
    color: #ff0000; /* Label bhi Red */
    margin-top: 2px;
    font-weight: bold;
}

.sep {
    font-size: 1.5rem; /* Separator chota kiya */
    font-weight: bold;
    color: #ff0000; /* Separator Red */
    padding-top: 2px;
}

.agency-link {
    color: #d0021b;
    font-weight: bold;
    text-decoration: none;
}

/* Modal / Popup */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background: #fff;
    width: 90%;
    max-width: 600px;
    position: relative;
    border-radius: 8px;
    padding: 5px;
}

.close-btn {
    position: absolute;
    top: -40px; right: 0;
    background: none; border: none;
    color: #fff; font-size: 35px; cursor: pointer;
}

.video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
}

.video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
}

@media (max-width: 480px) {
    .headline { font-size: 26px; }
    .time-box span { font-size: 1.4rem; }
    .sep { font-size: 1.2rem; }
}
</style>

<body>
    <main class="main-wrapper">
        <section class="content-section">
            <div class="container">

                    <p class="main-desc">RECOVER ALL YOUR LOSSES NOW EARN 3-10K DAILY 📈</p>
                </div>

                <div class="button-wrapper">
                    <a href="https://t.me/+Kdi1vHIa9bA5N2Y1" class="cta-button">
                        <div class="btn-main-text">

                </div>

                <div class="new-countdown-wrapper">
                    <div class="time-box">
                        <span id="days">00</span>
                        <p>days</p>
                    </div>
                    <div class="sep">:</div>
                    <div class="time-box">
                        <span id="hours">00</span>
                        <p>hours</p>
                    </div>
                    <div class="sep">:</div>
                    <div class="time-box">
                        <span id="minutes">00</span>
                        <p>minutes</p>
                    </div>
                    <div class="sep">:</div>
                    <div class="time-box">
                        <span id="seconds">00</span>
                        <p>seconds</p>
                    </div>
                </div>
                </div>
        </section>

    <div id="videoPopup" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/f48bbvvDJFQ?autoplay=0" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. Timer Logic: 15 Seconds Fix
    let timeLeft = 15; 
    const telegramURL = "https://t.me/+Kdi1vHIa9bA5N2Y1";

    // Static 00 set kar dete hain pehle hi
    document.getElementById("days").innerText = "00";
    document.getElementById("hours").innerText = "00";
    document.getElementById("minutes").innerText = "00";

    const countdownInterval = setInterval(() => {
        timeLeft--;

        // Sirf seconds update honge (Jaise: 14, 13, 12...)
        const secDisplay = document.getElementById("seconds");
        if (secDisplay) {
            secDisplay.innerText = timeLeft < 10 ? "0" + timeLeft : timeLeft;
        }

        // Jab timer 0 ho jaye toh link open ho jaye
        if (timeLeft <= 0) {
            clearInterval(countdownInterval);
            
            // Link open karne ka sabse fast tareeka
            window.location.replace(telegramURL);
            
            // Backup redirect (agar replace kaam na kare)
            setTimeout(() => {
                window.location.href = telegramURL;
            }, 300);
        }
    }, 1000);

    // 2. Popup/Video Logic
    const modal = document.getElementById('videoPopup');
    const closeBtn = document.querySelector('.close-btn');
    if (modal && closeBtn) {
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
            const iframe = modal.querySelector('iframe');
            if (iframe) iframe.src = iframe.src; // Video stop karne ke liye
        });
    }
});
</script>
